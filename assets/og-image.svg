<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Sooryashankar Joy OpenGraph image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0c10" />
      <stop offset="1" stop-color="#12162a" />
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c9cff" />
      <stop offset="0.55" stop-color="#67e8f9" />
      <stop offset="1" stop-color="#7c9cff" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="220" cy="120" r="220" fill="#7c9cff" opacity="0.14" filter="url(#soft)" />
  <circle cx="1030" cy="140" r="260" fill="#67e8f9" opacity="0.12" filter="url(#soft)" />
  <circle cx="640" cy="680" r="360" fill="#7c9cff" opacity="0.10" filter="url(#soft)" />

  <rect x="70" y="70" width="1060" height="490" rx="44" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)" />

  <text
    x="120"
    y="240"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="72"
    font-weight="800"
    fill="rgba(255,255,255,0.94)"
    letter-spacing="-1"
  >
    Sooryashankar Joy
  </text>

  <rect x="120" y="270" width="820" height="10" rx="999" fill="url(#a)" />

  <text
    x="120"
    y="340"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="34"
    font-weight="700"
    fill="rgba(255,255,255,0.78)"
  >
    Embedded Systems - Systems Programming - Hardware-Software Interfaces
  </text>

  <text
    x="120"
    y="410"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="26"
    font-weight="600"
    fill="rgba(255,255,255,0.70)"
  >
    Purdue University - C - Microcontrollers - Circuit Design - Digital Logic - Performance Optimization
  </text>
